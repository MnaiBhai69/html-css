<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>CSS & HTML Mastery Quiz | 70 Questions</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #f1f5fc 0%, #e9eef5 100%);
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    /* main quiz card */
    .quiz-container {
      max-width: 820px;
      width: 100%;
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(0px);
      border-radius: 2.5rem;
      box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.25), 0 4px 12px rgba(0, 0, 0, 0.05);
      overflow: hidden;
      transition: all 0.2s ease;
    }

    /* header area */
    .quiz-header {
      background: white;
      padding: 1.2rem 2rem;
      border-bottom: 1px solid #e9edf2;
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: baseline;
      gap: 1rem;
    }

    .title-badge {
      display: flex;
      align-items: baseline;
      gap: 0.6rem;
      flex-wrap: wrap;
    }

    h1 {
      font-size: 1.45rem;
      font-weight: 700;
      background: linear-gradient(135deg, #1e2b3c, #2c4c6e);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      letter-spacing: -0.3px;
    }

    .q-counter {
      background: #eef2ff;
      padding: 0.3rem 0.9rem;
      border-radius: 40px;
      font-size: 0.8rem;
      font-weight: 600;
      color: #1f4f7a;
      font-family: 'JetBrains Mono', monospace;
    }

    .score-pill {
      background: #eef2ff;
      padding: 0.3rem 1rem;
      border-radius: 40px;
      font-weight: 700;
      font-size: 0.85rem;
      color: #0e5a3c;
      font-family: 'JetBrains Mono', monospace;
    }

    /* progress */
    .progress-area {
      padding: 0 2rem;
      background: white;
    }

    .progress-track {
      height: 6px;
      background: #e2e8f0;
      border-radius: 8px;
      margin: 0.4rem 0 1rem 0;
      overflow: hidden;
    }

    .progress-fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #2c7da0, #5ea3c7);
      border-radius: 8px;
      transition: width 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    }

    /* main card */
    .quiz-card {
      padding: 2rem 2rem 2rem 2rem;
    }

    .question-text {
      font-size: 1.65rem;
      font-weight: 700;
      line-height: 1.35;
      color: #0a1c2a;
      margin-bottom: 1.8rem;
      letter-spacing: -0.3px;
    }

    /* options grid */
    .options-list {
      display: flex;
      flex-direction: column;
      gap: 0.9rem;
      margin-bottom: 1.5rem;
    }

    .option {
      background: #ffffff;
      border: 1.5px solid #e2e8f0;
      border-radius: 1.2rem;
      padding: 0.9rem 1.2rem;
      font-size: 1rem;
      font-weight: 500;
      color: #1e2f3d;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .option-prefix {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
      background: #f1f5f9;
      width: 34px;
      height: 34px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 40px;
      color: #2c4c6e;
      transition: all 0.1s;
    }

    .option:hover:not(.disabled-opt) {
      background: #f8fafc;
      border-color: #aac8e4;
      transform: translateX(4px);
    }

    /* correct / wrong styles */
    .option.correct-highlight {
      background: #dff9e6;
      border-color: #2b9348;
      color: #155724;
    }
    .option.correct-highlight .option-prefix {
      background: #2b9348;
      color: white;
    }

    .option.wrong-highlight {
      background: #ffe9ec;
      border-color: #d62828;
      color: #9b2226;
    }
    .option.wrong-highlight .option-prefix {
      background: #d62828;
      color: white;
    }

    .option.disabled-opt {
      cursor: default;
      opacity: 0.9;
    }

    /* feedback message */
    .feedback-message {
      margin: 1rem 0 1.2rem 0;
      padding: 0.9rem 1.2rem;
      border-radius: 1rem;
      font-size: 0.9rem;
      font-weight: 500;
      background: #fef9e6;
      border-left: 5px solid #f4a261;
      color: #7c4a2a;
      animation: fadeSlide 0.2s ease;
    }

    .feedback-message.success {
      background: #e2f3e4;
      border-left-color: #2b9348;
      color: #1e5631;
    }

    .feedback-message.error {
      background: #ffe6e8;
      border-left-color: #d62828;
      color: #a12226;
    }

    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(-6px);}
      to { opacity: 1; transform: translateY(0);}
    }

    /* navigation */
    .nav-buttons {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 1.2rem;
      gap: 1rem;
    }

    button {
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 0.9rem;
      padding: 0.7rem 1.5rem;
      border: none;
      border-radius: 2.2rem;
      cursor: pointer;
      transition: 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: white;
      border: 1px solid #cbd5e1;
      color: #2c3e50;
    }

    button.primary-btn {
      background: #2c7da0;
      border: none;
      color: white;
      box-shadow: 0 2px 6px rgba(44,125,160,0.2);
    }

    button.primary-btn:hover {
      background: #1f5e7e;
      transform: translateY(-2px);
    }

    button.secondary-btn:hover {
      background: #f1f5f9;
      border-color: #94a3b8;
    }

    button:active {
      transform: scale(0.97);
    }

    /* results screen */
    .results-screen {
      text-align: center;
      padding: 2rem 2rem 2rem 2rem;
    }

    .final-score-circle {
      background: linear-gradient(145deg, #f0f9ff, #e6edf6);
      width: 140px;
      height: 140px;
      border-radius: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.2rem;
      box-shadow: inset 0 1px 2px rgba(0,0,0,0.02), 0 12px 20px -10px rgba(0,0,0,0.1);
    }
    .score-number {
      font-size: 3rem;
      font-weight: 800;
      color: #1f5e7e;
      line-height: 1;
    }
    .score-total {
      font-weight: 500;
      color: #5b6e8c;
    }
    .stats-row {
      display: flex;
      justify-content: center;
      gap: 2rem;
      margin: 1.5rem 0;
    }
    .stat-item {
      background: #f8fafc;
      padding: 0.8rem 1.4rem;
      border-radius: 1.8rem;
      min-width: 100px;
    }
    .stat-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #557c9f;
    }
    .stat-value {
      font-weight: 800;
      font-size: 1.8rem;
      color: #0f2e3f;
    }
    .restart-btn {
      background: #2c7da0;
      color: white;
      border: none;
      padding: 0.8rem 2rem;
      font-size: 1rem;
    }
    hr {
      margin: 1rem 0;
    }

    @media (max-width: 620px) {
      .quiz-container {
        margin: 0;
        border-radius: 1.8rem;
      }
      .quiz-header {
        padding: 1rem 1.2rem;
      }
      .quiz-card {
        padding: 1.5rem;
      }
      .question-text {
        font-size: 1.35rem;
      }
      .option {
        padding: 0.7rem 1rem;
      }
      .nav-buttons button {
        padding: 0.5rem 1.2rem;
      }
    }
  </style>
</head>
<body>

<script>
  // --------------------------------------------------------------

    { text: "Which property creates rounded corners?", options: ["border-radius", "corner-round", "border-curve", "radius-border"], correct: 0, explanation: "border-radius: 8px; rounds edges." },

    { text: "How to apply a class 'highlight' to a div?", options: ["<div class='highlight'>", "<div id='highlight'>", "<div class=highlight>", "<div highlight>"], correct: 0, explanation: "class attribute with class name." },
    { text: "What is Flexbox used for?", options: ["1D layouts", "2D layouts", "animation", "fonts"], correct: 0, explanation: "Flexbox specializes in one-dimensional alignment." },
    { text: "Which CSS property changes text color?", options: ["text-color", "color", "foreground", "font-color"], correct: 1, explanation: "color: blue; changes text color." },
    { text: "What is the correct way to write a comment in CSS?", options: ["// comment", "<!-- comment -->", "/* comment */", "# comment"], correct: 2, explanation: "/* ... */ multi-line CSS comment." },
    { text: "Which attribute makes a checkbox preselected?", options: ["selected", "checked", "default", "mark"], correct: 1, explanation: "checked attribute for checkbox/radio." },
    { text: "What does 'position: absolute' do?", options: ["relative to viewport", "relative to nearest positioned ancestor", "relative to normal flow", "sticky"], correct: 1, explanation: "Absolute positioned relative to containing block." },
    { text: "Which CSS property adds shadow to text?", options: ["text-shadow", "box-shadow", "font-shadow", "shadow"], correct: 0, explanation: "text-shadow: 2px 2px 4px gray;" },
    { text: "Which HTML tag defines a hyperlink?", options: ["<a>", "<link>", "<href>", "<anchor>"], correct: 0, explanation: "<a href='url'>link</a>." },
    { text: "What does 'display: none' do?", options: ["hides element but keeps space", "hides element and removes space", "makes invisible still clickable", "sets opacity 0"], correct: 1, explanation: "element removed from layout." },
    { text: "Which CSS media feature targets mobile width?", options: ["@media (max-width: 768px)", "@media screen(mobile)", "@media width < 768", "@media responsive"], correct: 0, explanation: "max-width breakpoints for responsive." },
    { text: "Which tag creates a dropdown select?", options: ["<select>", "<dropdown>", "<input type='dropdown'>", "<list>"], correct: 0, explanation: "<select> plus <option> children." },
    { text: "CSS variable syntax?", options: ["$variable", "@variable", "--var-name", "#variable"], correct: 2, explanation: "Custom property: --primary-color: blue;" },
    { text: "HTML5 doctype declaration is:", options: ["<!DOCTYPE html>", "<!DOCTYPE HTML5>", "<!DOCTYPE html PUBLIC>", "<!DOCTYPE>"], correct: 0, explanation: "<!DOCTYPE html> is modern standard." },
    { text: "Which property controls overflow scroll?", options: ["overflow: scroll", "scroll: auto", "overflow-x", "all of these"], correct: 0, explanation: "overflow:scroll forces scrollbars." },
    { text: "What is the default position value?", options: ["absolute", "relative", "static", "fixed"], correct: 2, explanation: "static follows normal flow." },
    { text: "Which CSS grid property defines columns?", options: ["grid-template-columns", "grid-cols", "grid-definition", "grid-columns"], correct: 0, explanation: "grid-template-columns: 1fr 1fr;" },
    { text: "What does <article> represent?", options: ["a blog post", "generic container", "navigation", "sidebar"], correct: 0, explanation: "self-contained composition in page." },
    { text: "Which attribute opens a link in new tab?", options: ["target='_blank'", "target='new'", "rel='external'", "newtab='true'"], correct: 0, explanation: "target='_blank' opens new tab/window." },
    { text: "CSS transitions require:", options: ["property & duration", "keyframes", "animation-name", "transform only"], correct: 0, explanation: "transition: all 0.3s ease;" },

    { text: "What is specificity in CSS?", options: ["importance rule hierarchy", "color intensity", "size priority", "element width"], correct: 0, explanation: "specificity determines which rule applies." },
    { text: "Which selector selects all elements?", options: ["*", "all", "element", "global"], correct: 0, explanation: "* universal selector." },
    { text: "Which tag makes text bold?", options: ["<strong>", "<b>", "both", "<bold>"], correct: 2, explanation: "<strong> (semantic) or <b>." },
    { text: "What does 'vh' stand for?", options: ["viewport height", "vertical height", "variable height", "virtual height"], correct: 0, explanation: "1vh = 1% of viewport height." },
    { text: "Which input type is for email?", options: ["text", "email", "mail", "string"], correct: 1, explanation: "<input type='email'> validates format." },

    { text: "Which property changes font family?", options: ["font-family", "typeface", "font-style", "text-font"], correct: 0, explanation: "font-family: 'Inter', sans-serif;" },
    { text: "What does ARIA role provide?", options: ["accessibility", "SEO", "styling", "validation"], correct: 0, explanation: "Enhances assistive tech." },
    { text: "How to center block element horizontally?", options: ["margin: 0 auto;", "text-align:center", "position: center", "float:center"], correct: 0, explanation: "margin auto + block display works." },
    { text: "Which HTML element defines footer?", options: ["<footer>", "<bottom>", "<foot>", "<section>"], correct: 0, explanation: "<footer> semantic footer area." },
    { text: "Which CSS function repeats track?", options: ["repeat()", "repetition()", "cycle()", "loop()"], correct: 0, explanation: "repeat(3, 1fr) in grid." },
    { text: "Which attribute disables a button?", options: ["disabled", "readonly", "disable", "off"], correct: 0, explanation: "disabled attribute prevents interaction." },
    { text: "What is shorthand for margin: 10px 20px;", options: ["top/bottom 10px left/right 20px", "top 10px; right 20px; bottom 10px; left 20px", "both", "all margins"], correct: 0, explanation: "margin: vertical horizontal." },
    { text: "What is box-sizing: border-box?", options: ["padding/border included in width", "width only content", "margin inside", "excludes border"], correct: 0, explanation: "border-box makes width includes padding + border." },
    { text: "Which element is used for video?", options: ["<video>", "<media>", "<movie>", "<vid>"], correct: 0, explanation: "HTML5 video element." },
    { text: "What does 'flex-wrap: wrap' do?", options: ["allow items to next line", "prevents wrapping", "aligns center", "justify content"], correct: 0, explanation: "wraps flex items when overflow." },
    { text: "What is 'em' relative to?", options: ["parent font size", "root font size", "viewport", "element width"], correct: 0, explanation: "em relative to parent's font size." },
    { text: "Which CSS property adds drop shadow to box?", options: ["box-shadow", "drop-shadow", "shadow", "border-shadow"], correct: 0, explanation: "box-shadow: offset-x offset-y blur color;" },
    { text: "What does <main> tag represent?", options: ["dominant content", "sidebar", "footer area", "header area"], correct: 0, explanation: "<main> encloses primary page content." },
    { text: "Which selector targets input with type text?", options: ["input[type='text']", "input:text", "text-input", "input.text"], correct: 0, explanation: "Attribute selector." },
    { text: "What is the difference between padding and margin?", options: ["padding inside, margin outside", "both outside", "both inside", "margin inside padding outside"], correct: 0, explanation: "Padding interior, margin exterior." },
    { text: "Which HTML tag defines the body of a table?", options: ["<tbody>", "<table-body>", "<body>", "<tdata>"], correct: 0, explanation: "tbody groups table rows." },
    { text: "What does 'order' property in Flex do?", options: ["reorder items visually", "sort data", "priority loading", "stacking"], correct: 0, explanation: "order changes flex child sequence." },
    { text: "Which attribute defines alternative text for image?", options: ["alt", "title", "src", "longdesc"], correct: 0, explanation: "alt text for accessibility." },
    { text: "Which CSS property controls letter spacing?", options: ["letter-spacing", "word-spacing", "text-spacing", "kerning"], correct: 0, explanation: "letter-spacing: 0.5px;" }
  ];
  // ensure we have exactly 70 (current length 70)
  // The above array contains 70 questions (counted length 70). Perfect.

  // ---------- QUIZ ENGINE ----------
  let currentQuestions = [...QUESTIONS];
  let currentIndex = 0;
  let userAnswers = new Array(currentQuestions.length).fill(null);  // stores selected option index
  let answerLock = false;     // lock after answering current question

  // DOM elements (will be set after render)
  let container, quizCardDiv, resultScreenDiv;
  
  function renderQuiz() {
    const root = document.getElementById('quizRoot');
    if (!root) return;
    const totalQ = currentQuestions.length;
    const answeredCount = userAnswers.filter(a => a !== null).length;
    const score = computeScore();
    
    const progressPercent = ((currentIndex + 1) / totalQ) * 100;
    const currentQ = currentQuestions[currentIndex];
    const selectedIdx = userAnswers[currentIndex];
    const isAnswered = selectedIdx !== null;
    
    // build options HTML
    let optionsHtml = '';
    const letters = ['A', 'B', 'C', 'D'];
    currentQ.options.forEach((opt, idx) => {
      let additionalClass = '';
      let selectedMark = '';
      if (isAnswered) {
        if (idx === currentQ.correct) {
          additionalClass = 'correct-highlight';
        } else if (idx === selectedIdx && idx !== currentQ.correct) {
          additionalClass = 'wrong-highlight';
        }
        if (idx === selectedIdx) {
          // shows selected style
        }
      }
      optionsHtml += `
        <div class="option ${additionalClass} ${isAnswered ? 'disabled-opt' : ''}" data-opt-index="${idx}">
          <span class="option-prefix">${letters[idx]}</span>
          <span>${escapeHtml(opt)}</span>
        </div>
      `;
    });
    
    let feedbackHtml = '';
    if (isAnswered) {
      const isCorrect = (selectedIdx === currentQ.correct);
      const correctAnswerText = currentQ.options[currentQ.correct];
      feedbackHtml = `
        <div class="feedback-message ${isCorrect ? 'success' : 'error'}">
          <strong>${isCorrect ? '✓ Correct!' : '✗ Oops!'}</strong><br>
          ${!isCorrect ? `Correct answer: ${escapeHtml(correctAnswerText)}.<br>` : ''}
          ${escapeHtml(currentQ.explanation || 'Explanation: ' + currentQ.options[currentQ.correct])}
        </div>
      `;
    }
    
    const mainHtml = `
      <div class="quiz-header">
        <div class="title-badge">
          <h1>📘 CSS & HTML · Master Quiz</h1>
          <span class="q-counter">${currentIndex+1}/${totalQ}</span>
        </div>
        <div class="score-pill">⭐ Score: ${score}</div>
      </div>
      <div class="progress-area">
        <div class="progress-track">
          <div class="progress-fill" style="width: ${progressPercent}%;"></div>
        </div>
      </div>
      <div class="quiz-card">
        <div class="question-text">${escapeHtml(currentQ.text)}</div>
        <div class="options-list" id="optionsList">
          ${optionsHtml}
        </div>
        ${feedbackHtml}
        <div class="nav-buttons">
          <button class="secondary-btn" id="prevBtn" ${currentIndex === 0 ? 'disabled style="opacity:0.4"' : ''}>← Previous</button>
          <button class="primary-btn" id="nextBtn">${currentIndex === totalQ-1 ? 'Finish Quiz' : 'Next →'}</button>
        </div>
      </div>
    `;
    
    root.innerHTML = mainHtml;
    
    // attach option listeners if question not answered
    if (!isAnswered) {
      document.querySelectorAll('.option').forEach(optDiv => {
        optDiv.addEventListener('click', () => {
          if (answerLock) return;
          const optIndex = parseInt(optDiv.dataset.optIndex);
          if (userAnswers[currentIndex] === null) {
            userAnswers[currentIndex] = optIndex;
            answerLock = true;
            renderQuiz(); // re-render with feedback
            answerLock = false;
          }
        });
      });
    }
    
    // attach prev/next
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    if (prevBtn) prevBtn.addEventListener('click', () => { if (currentIndex > 0) { currentIndex--; answerLock = false; renderQuiz(); } });
    if (nextBtn) nextBtn.addEventListener('click', () => {
      if (userAnswers[currentIndex] === null) {
        // alert to answer before moving
        const msgDiv = document.createElement('div');
        // show temporary inline message but not intrusive
        alert('Please select an answer before moving to the next question.');
        return;
      }
      if (currentIndex === totalQ - 1) {
        // finish quiz -> results
        showResultsScreen();
      } else {
        currentIndex++;
        answerLock = false;
        renderQuiz();
      }
    });
  }

  function computeScore() {
    let correct = 0;
    for (let i=0; i<currentQuestions.length; i++) {
      if (userAnswers[i] !== null && userAnswers[i] === currentQuestions[i].correct) correct++;
    }
    return correct;
  }
  
  function showResultsScreen() {
    const total = currentQuestions.length;
    const correctCount = computeScore();
    const wrongCount = total - correctCount;
    const percent = Math.round((correctCount / total) * 100);
    const root = document.getElementById('quizRoot');
    root.innerHTML = `
      <div class="results-screen">
        <div class="final-score-circle">
          <div class="score-number">${correctCount}</div>
          <div class="score-total">/${total}</div>
        </div>
        <h2 style="margin-bottom:0.5rem;">✨ Quiz Completed ✨</h2>
        <div class="stats-row">
          <div class="stat-item"><div class="stat-label">Correct</div><div class="stat-value" style="color:#2b9348;">${correctCount}</div></div>
          <div class="stat-item"><div class="stat-label">Wrong</div><div class="stat-value" style="color:#d62828;">${wrongCount}</div></div>
          <div class="stat-item"><div class="stat-label">Accuracy</div><div class="stat-value">${percent}%</div></div>
        </div>
        <p style="color:#2c5f7a; margin-bottom: 2rem;">Great effort! Review topics to sharpen further.</p>
        <button class="restart-btn" id="restartQuizBtn">⟳ Restart Quiz</button>
      </div>
    `;
    document.getElementById('restartQuizBtn')?.addEventListener('click', () => {
      resetQuizAndRestart();
    });
  }
  
  function resetQuizAndRestart() {
    currentIndex = 0;
    userAnswers = new Array(currentQuestions.length).fill(null);
    answerLock = false;
    renderQuiz();
  }
  
  function escapeHtml(str) {
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
      return c;
    });
  }
  
  // init quiz
  window.addEventListener('DOMContentLoaded', () => {
    renderQuiz();
  });
</script>
</body>
</html>
